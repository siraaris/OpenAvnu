role = listener
friendly_name = aaf_wav_listener_8ch

stream_addr = 00:00:00:00:00:00
stream_uid = 0

max_transit_usec = 200000
report_seconds = 10

map_lib = ./libopenavb_map_aaf_audio.so
map_fn = openavbMapAVTPAudioInitialize
map_nv_item_count = 256
map_nv_tx_rate = 8000
map_nv_packing_factor = 1
map_nv_sparse_mode = 0

intf_lib = ./libopenavb_intf_wav_file.so
intf_fn = openavbIntfWavFileInitialize
intf_nv_audio_rate = 48000
intf_nv_audio_bit_depth = 32
intf_nv_audio_channels = 8
intf_nv_number_of_data_bytes = 15360000
intf_nv_file_name_rx = /tmp/openavnu_rme_capture_8ch.wav
