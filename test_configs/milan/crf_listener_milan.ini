#####################################################################
# CRF Listener configuration
#####################################################################
role = listener
friendly_name = crf_listener

# Set to the CRF talker MAC
stream_addr = 48:0b:b2:d0:01:7c
# Must be unique across all local INIs in one openavb_host process.
# (Does not need to match local CRF talker UID when using controller/ACMP.)
stream_uid = 8

# Optional static destination if SRP/MAAP is not driving connect
# dest_addr = 91:E0:F0:00:FE:08
dest_addr = 91:E0:F0:00:DD:6E

sr_class = A
max_transit_usec = 2000
report_seconds = 10
ifname = igb:enp2s0

#####################################################################
# Mapping module configuration
#####################################################################
map_lib = ./libopenavb_map_crf.so
map_fn = openavbMapCrfInitialize
map_nv_item_count = 64

# Expected CRF format
map_nv_crf_base_freq = 48000
map_nv_crf_timestamp_interval = 96
map_nv_crf_timestamps_per_pdu = 1
map_nv_crf_pull = 0
map_nv_crf_type = 1

#####################################################################
# Interface module configuration
#####################################################################
intf_lib = ./libopenavb_intf_null.so
intf_fn = openavbIntfNullInitialize

# For debugging/monitoring, consume CRF queue items immediately.
intf_nv_ignore_timestamp = 1


# Runtime-only CRF listener mode: update clock source, skip media queue enqueue
map_nv_crf_rx_bypass_queue = 1
