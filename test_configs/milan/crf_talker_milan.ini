#####################################################################
# General Talker configuration
#####################################################################
role = talker
friendly_name = crf_talker_milan
stream_uid = 8
max_interval_frames = 1
sr_class = A

max_transit_usec = 500
max_transmit_deficit_usec = 500

report_seconds = 10

#####################################################################
# Mapping module configuration
#####################################################################
map_lib = ./libopenavb_map_crf.so
map_fn = openavbMapCrfInitialize

# CRF parameters
map_nv_crf_base_freq = 48000
map_nv_crf_timestamp_interval = 96
map_nv_crf_timestamps_per_pdu = 1
map_nv_crf_pull = 0
map_nv_crf_type = 1

# map_nv_tx_rate overrides the transmit interval (packets/sec)
# map_nv_tx_rate = 500
map_nv_tx_min_lead_usec = 500

#####################################################################
# Interface module configuration
#####################################################################
intf_lib = ./libopenavb_intf_null.so
intf_fn = openavbIntfNullInitialize

# Explicit talker addressing for AVDECC
dest_addr = 91:E0:F0:00:FE:08
stream_addr = 00:1b:21:f3:98:e2

thread_rt_priority = 60

thread_affinity = 0x00000400

spin_wait = 0

# Launch-time margin for CRF TX scheduling
map_nv_crf_launch_lead_usec = 1000

# CRF runtime diagnostics
map_nv_crf_diag_enable = 1
map_nv_crf_diag_log_every_packets = 500
map_nv_crf_diag_jitter_thresh_ns = 250000
