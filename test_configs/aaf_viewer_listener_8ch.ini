role = listener
friendly_name = aaf_viewer_listener_8ch
initial_state = stopped

stream_addr = 00:00:00:00:00:00
stream_uid = 0

max_transit_usec = 5000
report_seconds = 10
ifname = sendmmsg:enp2s0

map_lib = ./libopenavb_map_aaf_audio.so
map_fn = openavbMapAVTPAudioInitialize
map_nv_item_count = 2048
map_nv_tx_rate = 8000
map_nv_packing_factor = 1
map_nv_sparse_mode = 0

intf_lib = ./libopenavb_intf_viewer.so
intf_fn = openavbIntfViewerInitialize
intf_nv_view_type = 3
intf_nv_view_interval = 32000
intf_nv_ignore_timestamp = 1
intf_nv_audio_rate = 48000
intf_nv_audio_bit_depth = 32
intf_nv_audio_type = int
intf_nv_audio_endian = big
intf_nv_audio_channels = 8
