#####################################################################
# Direct 32ch playback-device -> 4x 8ch Milan talkers (example)
#####################################################################
role = talker
friendly_name = avb32_direct_aaf_0
stream_uid = 0
max_interval_frames = 1
batch_factor = 1
sr_class = A
max_transit_usec = 2125
tx_submit_ahead_usec = 2000
tx_submit_skew_usec = 0
max_transmit_deficit_usec = 500
ifname = sendmmsg:enp2s0
report_seconds = 10
thread_rt_priority = 20

#####################################################################
# Mapping module configuration
#####################################################################
map_lib = ./libopenavb_map_aaf_audio.so
map_fn = openavbMapAVTPAudioInitialize
map_nv_item_count = 512
map_nv_tx_rate = 8000
map_nv_packing_factor = 1
map_nv_sparse_mode = 0
deferred_start = selected_clock
deferred_start_stable_usec = 500000
map_nv_selected_clock_prefer_local_media_phase = 1
map_nv_use_selected_clock_timestamps = 1
map_nv_item_timestamp_is_presentation = 1
map_nv_tx_min_lead_usec = 1000
map_nv_selected_clock_follow_updates = 0
map_nv_selected_clock_mute_usec = 500000

#####################################################################
# Interface module configuration
#####################################################################
intf_fn = openavbIntfAvb32DirectInitialize
intf_nv_device_path = /dev/avb32out_export
intf_nv_stream_index = 0
intf_nv_group_mask = 0x0f
intf_nv_audio_rate = 96000
intf_nv_audio_type = int
intf_nv_audio_bit_depth = 32
intf_nv_audio_channels = 8
intf_nv_audio_endian = little
intf_nv_target_latency_frames = 192
intf_nv_catchup_high_water_frames = 1920
intf_nv_source_presentation_offset_usec = 2000
intf_nv_constant_signal_enable = 0
intf_nv_constant_signal_level = 0
