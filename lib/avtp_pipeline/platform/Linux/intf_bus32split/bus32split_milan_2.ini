#####################################################################
# Shared 32ch ALSA capture -> 4x 8ch Milan talkers (stream 2)
#####################################################################
role = talker
friendly_name = bus32split_milan_2
# stream_addr = 00:00:00:00:00:00
stream_uid = 2
# dest_addr = 00:00:00:00:00:00
max_interval_frames = 1
batch_factor = 1
sr_class = A
max_transit_usec = 500
max_transmit_deficit_usec = 500
ifname = sendmmsg:enp2s0
fixed_timestamp = 1
report_seconds = 10
thread_rt_priority = 20

#####################################################################
# Mapping module configuration
#####################################################################
map_lib = ./libopenavb_map_aaf_audio.so
map_fn = openavbMapAVTPAudioInitialize
map_nv_item_count = 512
map_nv_tx_rate = 8000
map_nv_packing_factor = 1
map_nv_sparse_mode = 0
deferred_start = selected_clock
deferred_start_stable_usec = 1000000
map_nv_selected_clock_prefer_local_media_phase = 0
map_nv_tx_min_lead_usec = 10000
map_nv_tx_launch_skew_usec = 24
map_nv_selected_clock_follow_updates = 0
map_nv_selected_clock_warmup_usec = 500000
map_nv_selected_clock_mute_usec = 500000

#####################################################################
# Interface module configuration
#####################################################################
intf_fn = openavbIntfBus32SplitInitialize
intf_nv_device_name = bus32_cap
intf_nv_stream_index = 2
intf_nv_audio_rate = 96000
intf_nv_audio_type = int
intf_nv_audio_bit_depth = 32
intf_nv_audio_channels = 8
intf_nv_allow_resampling = 0
intf_nv_audio_endian = little
intf_nv_period_time = 2000
intf_nv_clock_skew_ppb = 0
intf_nv_fixed_ts_runtime_lead_usec = 0
